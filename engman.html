<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Star Sports // Dillzy</title>
<meta name="referrer" content="no-referrer">

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden}
.shaka-video-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
video{width:100%;height:100%;object-fit:contain}
</style>

</head>

<body>

<div id="player-container" class="shaka-video-container">
  <video id="video" autoplay muted playsinline></video>
</div>

<script>
(function(){

const CONFIG={
  streamUrl:"https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/output/index.mpd",
  keyId:"965dc2ddb1d85138ad787999a7f30ca5",
  key:"859695076e67fe961836b564db6d689c"
};

/* 🔥 PUT YOUR COOKIE HERE */
const cookieValue = "__hdnea__=st=1774866416~exp=1774952816~acl=/*~hmac=965e1a550b5e18fb744cd0de1d8ff04404b14c26c3a9457f82baa3fc37a5d3fe";

document.addEventListener("DOMContentLoaded",async()=>{

shaka.polyfill.installAll();
if(!shaka.Player.isBrowserSupported()) return;

const video=document.getElementById("video");
const container=document.getElementById("player-container");

video.muted=true;

const player=new shaka.Player(video);

const ui=new shaka.ui.Overlay(player,container,video);

ui.configure({
  addBigPlayButton:true,
  controlPanelElements:[
    "mute","play_pause","time_and_duration","spacer",
    "quality","picture_in_picture","fullscreen"
  ]
});

player.configure({
  drm:{clearKeys:{[CONFIG.keyId]:CONFIG.key}},
  manifest:{defaultPresentationDelay:5},
  streaming:{
    lowLatencyMode:true,
    bufferingGoal:10,
    rebufferingGoal:2,
    safeSeekOffset:5
  }
});

/* ✅ Direct Cookie Inject */
if(cookieValue){
  player.getNetworkingEngine().registerRequestFilter((type,request)=>{

    request.headers["Referer"]="https://www.jiotv.com/";
    request.headers["User-Agent"]="plaYtv/7.1.5 (Linux;Android 13)";
    request.headers["Cookie"]=cookieValue;

    let urlCookie=cookieValue.startsWith("__hdnea__=")
      ?cookieValue.substring(10)
      :cookieValue;

    if(
      (type===shaka.net.NetworkingEngine.RequestType.MANIFEST ||
       type===shaka.net.NetworkingEngine.RequestType.SEGMENT) &&
      !request.uris[0].includes("__hdnea__")
    ){
      const sep=request.uris[0].includes("?")?"&":"?";
      request.uris[0]+=sep+"__hdnea__="+urlCookie;
    }

  });
}

try{
  await player.load(CONFIG.streamUrl);
  video.play().catch(()=>{});
}catch(e){
  console.log(e);
}

video.addEventListener("play",()=>{
  video.muted=false;
});

});

})();
</script>

</body>
</html>
