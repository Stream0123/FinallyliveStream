<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finally Live - Live Match Link</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #121212; 
            color: #fff; 
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .hero-section {
            width: 90%;
            max-width: 600px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .title { 
            font-size: 3rem; 
            color: #ff3333; /* Red for Live theme */
            margin-bottom: 20px; 
            text-transform: uppercase;
            font-weight: 800;
        }

        /* Main Button Style */
        .btn-main {
            background-color: #ff9933; /* Orange for attention */
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(255, 153, 51, 0.4);
            cursor: pointer;
            border: none;
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        .btn-main:hover { transform: scale(1.05); }

        /* Pop-up (Modal) Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none; /* Hidden by default */
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open { display: flex; }
        .modal-overlay.open .modal-box { transform: scale(1); }

        .modal-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 15px;
        }

        .modal-text {
            color: #aaaaaa;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        /* Modal Action Buttons */
        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-modal {
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            flex: 1;
        }

        .btn-join {
            background-color: #0088cc; /* Telegram Blue */
            color: white;
        }

        .btn-cancel {
            background-color: #444; /* Grey for Cancel */
            color: #ccc;
        }

        .btn-join:hover { background-color: #006699; }
        .btn-cancel:hover { background-color: #555; }

    </style>
</head>

        <button class="btn-main" id="watchBtn">🔴 Watch Live Match Now</button>
    </div>

            <div class="modal-actions">
                <a href="https://t.me/AapkaTelegramLink" class="btn-modal btn-join" target="_blank" id="joinBtn">JOIN NOW</a>
                <button class="btn-modal btn-cancel" id="cancelBtn">Cancel</button>
            </div>
        </div>
    </div>
